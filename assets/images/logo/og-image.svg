<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0808" />
      <stop offset="50%" stop-color="#0f0202" />
      <stop offset="100%" stop-color="#1c0505" />
    </linearGradient>
    
    <!-- Red Accent Gradient -->
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e" />
      <stop offset="100%" stop-color="#ff4d4d" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  
  <!-- Subtle decorative grids/lines representing modern workshop structure -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="630" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="500" y1="0" x2="500" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="700" y1="0" x2="700" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
    <line x1="1100" y1="0" x2="1100" y2="630" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />
  </g>

  <!-- Decorative Corner Glows -->
  <circle cx="0" cy="0" r="400" fill="#e53e3e" fill-opacity="0.1" filter="blur(50px)" />
  <circle cx="1200" cy="630" r="300" fill="#e53e3e" fill-opacity="0.08" filter="blur(50px)" />

  <!-- Logo Graphics / Wrench Circle -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#red-grad)" stroke-width="8" />
    <path d="M-12 -20 L12 -20 L16 10 C18 18 10 24 0 24 C-10 24 -18 18 -16 10 Z" fill="#ffffff" opacity="0.9" />
    <path d="M0 -30 L-25 -5 L-5 15 L20 -10 Z" fill="url(#red-grad)" />
    <circle cx="0" cy="0" r="6" fill="#0f0202" />
  </g>

  <!-- Typography -->
  <g font-family="System-UI, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- Brand Name -->
    <text x="600" y="340" font-size="70" font-weight="900" fill="#ffffff" letter-spacing="-1">
      LAMBODAR <tspan fill="url(#red-grad)">MOTORS</tspan>
    </text>
    
    <!-- Tagline -->
    <text x="600" y="405" font-size="28" font-weight="600" fill="#f7fafc" letter-spacing="1">
      Premium Car Denting, Painting &amp; Repair Workshop
    </text>
    
    <!-- Location and Highlights -->
    <text x="600" y="470" font-size="20" font-weight="500" fill="#a0aec0" letter-spacing="4" text-transform="uppercase">
      Gota, Ahmedabad • Trustworthy Service • Genuine Spares
    </text>
  </g>

  <!-- Bottom Accent Stripe -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#red-grad)" />
</svg>
