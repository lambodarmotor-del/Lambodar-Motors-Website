<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="100%" height="100%" fill="#16161a"/>
  <!-- Decorative Grid -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="300" x2="600" y2="300" />
  </g>
  <!-- Icon Representation: Car body panel and hammer/denting tool -->
  <circle cx="300" cy="180" r="60" fill="#e53e3e" fill-opacity="0.1" />
  <path d="M260 170c10-20 30-30 50-20s30 30 20 50-30 30-50 20-30-30-20-50z" fill="none" stroke="#e53e3e" stroke-width="4" stroke-dasharray="6,4"/>
  <path d="M290 140l30 30-40 40-30-30z" fill="#f7fafc" opacity="0.8"/>
  <rect x="295" y="130" width="10" height="20" rx="2" fill="#e53e3e"/>
  <!-- Typography -->
  <text x="300" y="290" font-family="'Outfit', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Car Denting &amp; Panel Repair</text>
  <text x="300" y="320" font-family="'Outfit', sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">Real Photo Placeholder [Slot 1]</text>
  <!-- Red accent bottom line -->
  <rect x="0" y="392" width="600" height="8" fill="#e53e3e" />
</svg>
